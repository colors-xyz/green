<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Green">
    <link rel="canonical" href="https://000255000.xyz/">
    
    <!-- Preconnect to Google Domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Async Font Loading -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&display=swap"></noscript>

    <title>Green</title>
    <style>
        body { background-color: #00FF00; margin: 0; font-family: 'JetBrains Mono', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; color: #000; text-align: center; overflow: hidden; }
        h1 { font-size: clamp(3rem, 15vw, 10rem); margin: 0; text-transform: uppercase; font-weight: 800; line-height: 1; }
    </style>
</head>
<body>
    <main>
        <h1>Green</h1>
    </main>
    
    <script>
        // Analytics ID
        const GA_ID = 'G-1CEH6G77YV';

        // Function to inject GA4
        function loadGA() {
            // Add the gtag script to the document head
            const script = document.createElement('script');
            script.src = `https://www.googletagmanager.com/gtag/js?id=${GA_ID}`;
            script.async = true;
            document.head.appendChild(script);

            // Configure GA
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', GA_ID);

            // Cleanup: remove listeners so it only runs once
            window.removeEventListener('mousemove', loadGA);
            window.removeEventListener('touchstart', loadGA);
            window.removeEventListener('scroll', loadGA);
        }

        // Trigger on interaction
        window.addEventListener('mousemove', loadGA, { once: true });
        window.addEventListener('touchstart', loadGA, { once: true });
        window.addEventListener('scroll', loadGA, { once: true });
    </script>
</body>
</html>
